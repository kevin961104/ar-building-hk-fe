<!DOCTYPE html>
<html lang="en">

<head>
    <title>AR Building Hong Kong</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!--<link rel="icon" href="%PUBLIC_URL%/favicon.ico" />-->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web application created for HKU COMP7705" />
    <!--<link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />-->
    <!--<link rel="manifest" href="../src/index.css" />-->
    <link rel="stylesheet" href="../src/index.css">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js'></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <a-scene embedded vr-mode-ui='enabled: false' device-orientation-permission-ui="enabled: false" arjs='sourceType: webcam; debugUIEnabled: false'>
    <a-camera gps-camera='minDistance: 0' look-controls-enabled='false' listener look-controls arjs-look-controls='smoothingFactor: 0.1' rotation-reader>
      <a-cursor cursor='rayOrigin: mouse; fuse: true; fuseTimeout: 0;' raycaster="objects: .raycastable;" position="0 0 -1" material="opacity: 0;alphaTest: 0.5;"></a-cursor>
      <a-image src="./crosshair.png" material="alphaTest: 0.5" width="0.07" height="0.07" position="0 0 -1"></a-image>
      <a-text visible="true" id="details" value="" color="white" material="alphaTest: 0.5;" position="-0.4 -0.6 -5" resize-text></a-text>
    </a-camera>
  </a-scene>
</body>
</html>

<style>
  .a-canvas.a-grab-cursor:hover{z-index:-1;cursor:default !important}.a-canvas.a-grab-cursor:active,.a-grabbing{z-index:-1;cursor:default !important}
</style>
<script type="text/javascript">
  AFRAME.registerComponent('resize-text', {
  init: function() {
    var self = this;
    window.addEventListener('resize', function(e) {
      var height = window.innerHeight;
      var width = window.innerWidth;
      self.el.setAttribute('width', (width/100));
    });
  }
});
  let isFused = false;
  AFRAME.registerComponent('cursor-listener', {
  dependencies: ['raycaster'],
  init: function () {
    this.el.addEventListener('raycaster-intersected', function (e) {
      if (!isFused) {
        isFused = true;
        const detailText = document.getElementById("details");
        const buildingDetails = e.detail.getIntersection(e.target).object.el.attributes[0].value?.split("|");
        const id = buildingDetails[0];
        const buildingName = buildingDetails[1];
        detailText.setAttribute("value", buildingName);
        detailText.setAttribute("visible", "true");
        console.log('I was fused at: ', buildingName);
      }
    });
    this.el.addEventListener('raycaster-intersected-cleared', function (e) {
      if (isFused) {
        const detailText = document.getElementById("details");
        detailText.setAttribute("visible", "false");
        detailText.setAttribute("value", "");
        isFused = false;
        console.log('I leave fused now');
      }
    });
  }
});
  async function updateBuildingEnitity(latitude, longitude) {
    const west = longitude - 0.0015;
    const east = longitude + 0.0015;
    const south = latitude - 0.0015;
    const north = latitude + 0.0015;
    const response = await fetch(`https://ar-building-hk-be.ap-east-1.elasticbeanstalk.com/api/map?bbox=${west},${south},${east},${north}`);
    const pois = await response.json();
    console.log(pois.data.buildings.length);
    console.log(`https://ar-building-hk-be.ap-east-1.elasticbeanstalk.com/api/map?bbox=${west},${south},${east},${north}`);
    const ac = document.querySelector("a-scene");
    let html = "";
    pois.data.buildings.forEach((building) => {
      let template = document.createElement('template');
      let existingAtext = document.getElementById(`#${building.id}`);
      if (!existingAtext === true) {
        const html = `<a-box data="${building.id}|${building.building_name_en}|${building.latitude}|${building.longitude}" color="red" visible="true" look-at="[gps-camera]" cursor-listener class="raycastable" scale="2 2 2" gps-entity-place="latitude: ${building.latitude}; longitude: ${building.longitude};"></a-box>`;
          template.innerHTML = html;
          const node = template.content.firstChild;
          ac.appendChild(node);
      }
    });
    ac.flushToDOM(true);
  }
  async function getLocation() {
      if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(showPosition);
      }
      else {
          console.log("Geolocation is not supported by this browser");
      }
  }
  async function showPosition(position) {
    console.log("Latitude: " + position.coords.latitude);
    console.log("Longitude: " + position.coords.longitude);
    await updateBuildingEnitity(position.coords.latitude, position.coords.longitude);
  }
  window.onload = async () => {
      await getLocation();
      const el = document.querySelector("[gps-camera]");
      el.addEventListener("gps-camera-update-position", async() => {
        await getLocation();
      });
  };
</script>
