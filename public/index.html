<!DOCTYPE html>
<html lang="en">

<head>
    <title>AR Building Hong Kong</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!--<link rel="icon" href="%PUBLIC_URL%/favicon.ico" />-->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web application created for HKU COMP7705" />
    <link rel="stylesheet" href="../src/index.css" />
    <script src='https://aframe.io/releases/0.9.2/aframe.min.js'></script>
    <script src="https://raw.githack.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script>
        THREEx.ArToolkitContext.baseURL = 'https://raw.githack.com/jeromeetienne/ar.js/master/three.js/'
    </script>
    <script type="text/javascript">
      AFRAME.registerComponent("visibility", {
        init: function () {
          var hints = document.querySelector('a-scene').sceneEl.querySelector("a-entity");
          this.el.addEventListener("click", (e) => {
            const value = !hints.getAttribute('visible');
            hints.setAttribute('visible', value);
          })
        }
      })
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded vr-mode-ui='enabled: false' arjs='sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: true' renderer='antialias: true; alpha: true'>
    <a-camera near='0.1' far='100' gps-camera='minDistance: 40;' look-controls-enabled='false' look-at="[gps-camera]" arjs-look-controls='smoothingFactor: 0.1' rotation-reader></a-camera>
  </a-scene>
</body>
</html>

<script type="text/javascript">
  async function updateBuildingEnitity(latitude, longitude) {
    const west = longitude - 0.001;
    const east = longitude + 0.001;
    const south = latitude - 0.001;
    const north = latitude + 0.001;
    const response = await fetch(`https://ar-building-hk-be.ap-east-1.elasticbeanstalk.com/api/map?bbox=${west},${south},${east},${north}`);
    const pois = await response.json();
    console.log(pois.data.buildings.length);
    console.log(`https://ar-building-hk-be.ap-east-1.elasticbeanstalk.com/api/map?bbox=${west},${south},${east},${north}`);
    const ac = document.querySelector("a-scene");
    let html = "";
    pois.data.buildings.forEach((building) => {
      console.log(building.latitude);
      console.log(building.longitude);
      let template = document.createElement('template');
      let existingAtext = document.getElementById(`#${building.id}`);
      console.log(!existingAtext);
      if (!existingAtext) {
        const html = `<a-entity id="${building.id}" gps-entity-place="latitude: ${building.latitude}; longitude: ${building.longitude};">
        <a-text value="${building.building_name_en}" look-at="[gps-camera]" scale="15 15 15" align="center"></a-text></a-entity>`;
        template.innerHTML = html;
        const node = template.content.firstChild;
        node.addEventListener('loaded', () => {
            window.dispatchEvent(new CustomEvent('gps-entity-place-loaded'));
        });
        ac.appendChild(node);
      }
    });
    ac.flushToDOM(true);
  }
  async function getLocation() {
      if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(showPosition);
      }
      else {
          console.log("Geolocation is not supported by this browser");
      }
  }
  async function showPosition(position) {
    console.log("Latitude: " + position.coords.latitude);
    console.log("Longitude: " + position.coords.longitude);
    await updateBuildingEnitity(position.coords.latitude, position.coords.longitude);
  }
  window.onload = async () => {
      await getLocation();
  };
  const el = document.querySelector("[gps-camera]");
  el.addEventListener("gps-camera-update-position", async(e) => {
    await updateBuildingEnitity(e.detail.position.latitude, e.detail.position.longitude);
  });
</script>
